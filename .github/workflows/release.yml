name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux/amd64
            artifact: GalleryTags
            build_tags: webkit2_41
          - os: windows-latest
            target: windows/amd64
            artifact: GalleryTags.exe
            build_tags: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential pkg-config

      - name: Install Yarn
        run: corepack enable

      - name: Build
        run: wails build -platform ${{ matrix.target }} ${{ matrix.build_tags && format('-tags {0}', matrix.build_tags) || '' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/bin/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/GalleryTags/GalleryTags release/GalleryTags-linux-amd64
          cp artifacts/GalleryTags.exe/GalleryTags.exe release/GalleryTags-windows-amd64.exe
          chmod +x release/GalleryTags-linux-amd64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true